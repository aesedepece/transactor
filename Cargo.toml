[package]
name = "transactor"
version = "0.1.0"
edition = "2024"
authors = ["Adan SdPC <adan@witnet.foundation>"]
repository = "aesedepece/transactor"
readme = "README.md"
license-file = "LICENSE"
keywords = ["transaction", "deposit", "withdrawal", "account", "balance"]
description = "A robust transaction processing engine and accounting system with support for deposits, withdrawals, disputes, resolutions and chargebacks."

[dependencies]
# A standard in the Rust ecosystem for numeric traits such as `num::traits::Zero`, which in our case gives us a lot of
# adaptability if type aliases need to be changed in the future.
num = "0.4.3"
# The gold standard for error handling and formatting these days, better in every way than the old `failure`.
thiserror = "2.0.18"
