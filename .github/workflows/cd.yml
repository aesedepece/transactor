name: Rust CD

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Unit Tests
        run: cargo test

      - name: Build Release Binary
        run: cargo build --release

      - name: Verify E2E Tests
        run: |
          cargo run --release --features deterministic -- tests/test_input.csv > actual_output.csv
          diff actual_output.csv tests/expected_output.csv

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          cp target/release/transactor release_assets/transactor-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          cd release_assets && tar -czf ../transactor-x86_64-unknown-linux-gnu.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: transactor-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          body: "Automated release for version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Documentation
        run: cargo doc --no-deps --all-features

      - name: Fix Pathing for GitHub Pages
        run: echo '<meta http-equiv="refresh" content="0; url=transactor/index.html">' > target/doc/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/doc'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty